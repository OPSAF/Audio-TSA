<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} — Audio Lab 文档</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0b0c10;
            --bg-secondary: rgba(18, 18, 24, 0.95);
            --bg-tertiary: rgba(26, 26, 36, 0.88);
            --surface: rgba(255, 255, 255, 0.08);
            --text-primary: #f5f5fb;
            --text-secondary: rgba(245, 245, 251, 0.68);
            --text-muted: rgba(245, 245, 251, 0.45);
            --accent: #FF6B00;
            --accent-soft: rgba(255, 107, 0, 0.11);
            --accent-strong: #ff8f42;
            --border: rgba(255, 255, 255, 0.12);
            --border-hover: rgba(255, 107, 0, 0.28);
            --glass: rgba(18, 18, 24, 0.58);
            --glass-border: rgba(255, 255, 255, 0.08);
            --shadow: 0 24px 80px rgba(0, 0, 0, 0.24);
            --radius: 24px;
        }
        [data-theme="light"] {
            --bg-primary: #ffffff;
            --bg-secondary: rgba(255, 255, 255, 0.92);
            --bg-tertiary: rgba(245, 247, 251, 0.95);
            --surface: rgba(255, 255, 255, 0.82);
            --text-primary: #12121b;
            --text-secondary: rgba(18, 18, 27, 0.66);
            --text-muted: rgba(18, 18, 27, 0.42);
            --accent: #FF2A55;
            --accent-soft: rgba(255, 42, 85, 0.12);
            --accent-strong: #ff4d73;
            --border: rgba(18, 18, 27, 0.10);
            --border-hover: rgba(255, 42, 85, 0.24);
            --glass: rgba(255, 255, 255, 0.72);
            --glass-border: rgba(18, 18, 27, 0.08);
            --shadow: 0 24px 80px rgba(0, 0, 0, 0.12);
        }
        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            min-height: 100vh;
            margin: 0;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(circle at top right, rgba(255,107,0,0.12), transparent 28%),
                        linear-gradient(180deg, var(--bg-primary) 0%, #090a10 100%);
            color: var(--text-primary);
            overflow-x: hidden;
            transition: background 0.4s ease, color 0.4s ease;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image: radial-gradient(circle at 25% 20%, rgba(255,107,0,0.12), transparent 18%),
                              radial-gradient(circle at 80% 15%, rgba(255,255,255,0.08), transparent 20%);
            opacity: 1;
        }
        .theme-toggle {
            position: fixed;
            right: 24px;
            top: 24px;
            z-index: 50;
            width: 62px;
            height: 34px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--glass);
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 4px;
            transition: all 0.35s cubic-bezier(0.25, 1, 0.5, 1);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }
        .theme-toggle:hover { transform: scale(1.03); }
        .theme-toggle__thumb {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            box-shadow: 0 10px 28px rgba(255, 107, 0, 0.25);
            transition: transform 0.35s cubic-bezier(0.25, 1, 0.5, 1);
        }
        [data-theme="light"] .theme-toggle__thumb { transform: translateX(28px); }
        .app-shell {
            min-height: 100vh;
            padding: 48px 24px 64px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .window-frame {
            width: min(1220px, 100%);
            border-radius: 24px;
            background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.08));
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
        }
        .window-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            padding: 18px 24px;
            background: rgba(255,255,255,0.04);
            border-bottom: 1px solid var(--glass-border);
            position: relative;
        }
        .mac-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .mac-spot {
            width: 12px;
            height: 12px;
            border-radius: 999px;
            position: relative;
        }
        .mac-spot::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 999px;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .mac-spot:hover::after { opacity: 0.14; }
        .mac-spot.red { background: #ff5f57; }
        .mac-spot.yellow { background: #ffbd2e; }
        .mac-spot.green { background: #28c940; }
        .window-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            letter-spacing: 1px;
            color: var(--accent);
        }
        .window-title i { font-size: 1.15rem; }
        .window-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .ghost-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            border-radius: 999px;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-size: 0.9rem;
            text-decoration: none;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }
        .ghost-btn:hover { transform: translateY(-1px); border-color: var(--accent); }
        .window-body {
            display: grid;
            grid-template-columns: 280px minmax(0, 1fr);
            gap: 24px;
            padding: 32px;
        }
        .sidebar {
            position: sticky;
            top: 30px;
            align-self: start;
            display: flex;
            flex-direction: column;
            gap: 24px;
            padding: 24px;
            border-radius: 24px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 60px rgba(0,0,0,0.12);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        .sidebar-brand {
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-secondary);
            font-weight: 700;
        }
        .sidebar p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.75;
        }
        .nav-menu {
            display: grid;
            gap: 10px;
        }
        .nav-link {
            display: block;
            padding: 14px 18px;
            border-radius: 16px;
            color: var(--text-primary);
            text-decoration: none;
            border: 1px solid transparent;
            transition: all 0.35s cubic-bezier(0.25, 1, 0.5, 1);
            font-weight: 600;
            background: rgba(255,255,255,0.03);
        }
        .nav-link:hover {
            border-color: var(--border-hover);
            background: var(--accent-soft);
            color: var(--accent);
        }
        .nav-link.active {
            background: linear-gradient(135deg, rgba(255,107,0,0.14), rgba(255,107,0,0.04));
            color: var(--accent);
            border-color: var(--accent-soft);
        }
        .content-wrap {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .breadcrumb {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            color: var(--text-muted);
            font-size: 0.88rem;
        }
        .breadcrumb a {
            color: inherit;
            text-decoration: none;
            opacity: 0.8;
        }
        .breadcrumb a:hover { opacity: 1; }
        .content-panel {
            padding: 32px;
            background: var(--glass);
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            overflow: hidden;
        }
        .page-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.7rem;
            color: var(--accent);
            margin-bottom: 18px;
        }
        .page-heading {
            margin: 0;
            font-family: 'Cinzel', serif;
            font-size: clamp(2rem, 4vw, 3.2rem);
            letter-spacing: 1px;
            line-height: 1.05;
            color: var(--text-primary);
        }
        .page-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-top: 18px;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }
        .doc-content {
            margin-top: 32px;
            line-height: 1.85;
        }
        .doc-content h1, .doc-content h2, .doc-content h3, .doc-content h4 {
            color: var(--text-primary);
            scroll-margin-top: 120px;
        }
        .doc-content h1 { font-size: 2.4rem; margin-bottom: 14px; }
        .doc-content h2 { font-size: 1.8rem; margin-top: 40px; margin-bottom: 14px; }
        .doc-content h3 { font-size: 1.4rem; margin-top: 32px; margin-bottom: 12px; }
        .doc-content p { margin-bottom: 18px; color: var(--text-secondary); }
        .doc-content a { color: var(--accent); text-decoration: none; }
        .doc-content a:hover { text-decoration: underline; }
        .doc-content pre, .doc-content code {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(255,255,255,0.04);
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .doc-content pre {
            padding: 20px;
            overflow-x: auto;
            margin-bottom: 24px;
        }
        .doc-content table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 24px;
            background: rgba(255,255,255,0.04);
            border-radius: 14px;
            overflow: hidden;
        }
        .doc-content th, .doc-content td {
            padding: 14px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            color: var(--text-secondary);
        }
        .doc-content th {
            background: rgba(255,255,255,0.05);
            color: var(--text-primary);
            text-align: left;
        }
        .doc-content blockquote {
            border-left: 4px solid var(--accent);
            padding: 18px 22px;
            margin: 24px 0;
            color: var(--text-secondary);
            background: rgba(255,255,255,0.04);
            border-radius: 14px;
        }
        .doc-content ul, .doc-content ol {
            margin: 16px 0 24px 24px;
        }
        .doc-content li { margin-bottom: 12px; }
        .doc-content img { max-width: 100%; border-radius: 18px; margin: 24px 0; }
        @media (max-width: 1080px) {
            .window-body { grid-template-columns: 1fr; }
            .sidebar { position: relative; top: auto; }
        }
        @media (max-width: 720px) {
            .window-frame { border-radius: 20px; }
            .window-header, .window-body { padding: 18px; }
            .window-body { gap: 18px; }
            .content-panel { padding: 24px; }
            .theme-toggle { right: 16px; top: 16px; }
        }
    </style>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
</head>
<body data-theme="dark">
    <button class="theme-toggle" type="button" aria-label="切换主题">
        <span class="theme-toggle__thumb"></span>
    </button>

    <div class="app-shell">
        <div class="window-frame">
            <header class="window-header">
                <div class="mac-controls">
                    <span class="mac-spot red"></span>
                    <span class="mac-spot yellow"></span>
                    <span class="mac-spot green"></span>
                </div>
                <div class="window-title"><i class="fas fa-book-open"></i> Audio Lab 文档</div>
                <div class="window-actions">
                    <a class="ghost-btn" href="/"><i class="fas fa-home"></i> 返回主页</a>
                </div>
            </header>

            <div class="window-body">
                <aside class="sidebar">
                    <div class="sidebar-brand">文档导航</div>
                    <p>无刷新 SPA 体验，点击左侧章节即可快速切换，阅读过程保持流畅。</p>
                    <nav class="nav-menu">
                        <a class="nav-link" data-page="index" href="/docs">文档首页</a>
                        <a class="nav-link" data-page="guide" href="/docs/guide">使用指南</a>
                        <a class="nav-link" data-page="theory" href="/docs/theory">理论基础</a>
                        <a class="nav-link" data-page="analysis" href="/docs/analysis">分析详解</a>
                        <a class="nav-link" data-page="results" href="/docs/results">结果解读</a>
                    </nav>
                </aside>

                <main class="content-wrap">
                    <div class="breadcrumb">
                        <a href="/">主页</a>
                        <span>›</span>
                        <a href="/docs">文档</a>
                        <span>›</span>
                        <span id="breadcrumbPage">{{ title }}</span>
                    </div>

                    <section class="content-panel">
                        <div class="page-badge">SPA 文档</div>
                        <h1 class="page-heading" id="pageHeading">{{ title }}</h1>
                        <div class="page-meta">
                            <span>Apple 级别质感</span>
                            <span>双主题 | 无刷新切换 | Markdown 渲染</span>
                        </div>
                        <div class="doc-content" id="docContent">{{ content | safe }}</div>
                    </section>
                </main>
            </div>
        </div>
    </div>

    <script>
        const themeToggle = document.querySelector('.theme-toggle');
        const body = document.body;
        const navLinks = Array.from(document.querySelectorAll('.nav-link'));
        const pageHeading = document.getElementById('pageHeading');
        const breadcrumbPage = document.getElementById('breadcrumbPage');
        const docContent = document.getElementById('docContent');

        function setTheme(theme) {
            if (theme === 'light') {
                body.setAttribute('data-theme', 'light');
            } else {
                body.removeAttribute('data-theme');
            }
            localStorage.setItem('audiolab_theme', theme);
        }

        themeToggle.addEventListener('click', () => {
            const next = body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            setTheme(next);
        });

        const savedTheme = localStorage.getItem('audiolab_theme');
        if (savedTheme) setTheme(savedTheme);

        function setActiveLink(page) {
            navLinks.forEach(link => {
                if (link.dataset.page === page) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });
        }

        async function fetchDocPage(page, push = true) {
            const url = page === 'index' ? '/docs?ajax=1' : `/docs/${page}?ajax=1`;
            const response = await fetch(url);
            if (!response.ok) {
                docContent.innerHTML = '<p>无法加载文档，请稍后重试。</p>';
                return;
            }
            const data = await response.json();
            const fadeTarget = docContent;

            fadeTarget.style.opacity = '0';
            fadeTarget.style.transform = 'translateY(12px)';
            setTimeout(() => {
                pageHeading.textContent = data.title;
                breadcrumbPage.textContent = data.title;
                docContent.innerHTML = data.content;
                document.title = `${data.title} — Audio Lab 文档`;
                setActiveLink(data.page || 'index');
                if (window.MathJax && window.MathJax.typesetPromise) {
                    window.MathJax.typesetPromise([docContent]).catch(() => {});
                }
                fadeTarget.style.opacity = '1';
                fadeTarget.style.transform = 'translateY(0)';
            }, 180);

            if (push) {
                const newPath = page === 'index' ? '/docs' : `/docs/${page}`;
                history.pushState({ page }, '', newPath);
            }
        }

        navLinks.forEach(link => {
            link.addEventListener('click', event => {
                const page = event.currentTarget.dataset.page;
                if (!page) return;
                event.preventDefault();
                fetchDocPage(page);
            });
        });

        window.addEventListener('popstate', event => {
            const page = event.state ? event.state.page : null;
            if (page) {
                fetchDocPage(page, false);
            } else {
                const segments = window.location.pathname.split('/').filter(Boolean);
                const pageName = segments.length > 1 ? segments[1] : 'index';
                fetchDocPage(pageName, false);
            }
        });

        setActiveLink({{ (page if page else 'index') | tojson }});
        history.replaceState({ page: {{ (page if page else 'index') | tojson }} }, '', window.location.pathname);
    </script>
</body>
</html>
