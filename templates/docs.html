<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} — Audio Lab 文档</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
            background: #f5f7fa;
            color: #2c3e50;
            line-height: 1.8;
        }
        /* ---- Top Bar ---- */
        .topbar {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            padding: 14px 32px;
            display: flex; align-items: center; gap: 24px;
            position: sticky; top: 0; z-index: 100;
        }
        .topbar a { color: #a8d8ff; text-decoration: none; font-size: 14px; }
        .topbar a:hover { color: #ffd700; }
        .topbar .brand { font-weight: 700; font-size: 18px; color: white; margin-right: auto; }
        /* ---- Sidebar ---- */
        .layout { display: flex; max-width: 1300px; margin: 0 auto; }
        .sidebar {
            width: 240px; min-width: 240px;
            padding: 24px 16px;
            background: white; border-right: 1px solid #e0e4e8;
            position: sticky; top: 56px; height: calc(100vh - 56px); overflow-y: auto;
        }
        .sidebar h3 { font-size: 13px; color: #888; text-transform: uppercase; margin-bottom: 12px; letter-spacing: 1px; }
        .sidebar a {
            display: block; padding: 8px 12px; border-radius: 6px;
            font-size: 14px; color: #555; text-decoration: none; margin-bottom: 2px;
        }
        .sidebar a:hover, .sidebar a.active { background: #eef2ff; color: #2563eb; font-weight: 600; }
        /* ---- Content ---- */
        .content {
            flex: 1; min-width: 0;
            padding: 32px 40px;
            background: white; min-height: 100vh;
        }
        .content h1 { font-size: 2em; margin-bottom: 8px; border-bottom: 3px solid #2563eb; padding-bottom: 10px; }
        .content h2 { font-size: 1.5em; margin-top: 36px; margin-bottom: 12px; color: #1a1a2e; border-bottom: 1px solid #e8ecf1; padding-bottom: 6px; }
        .content h3 { font-size: 1.2em; margin-top: 24px; margin-bottom: 8px; color: #333; }
        .content h4 { font-size: 1.05em; margin-top: 16px; margin-bottom: 6px; }
        .content p { margin-bottom: 14px; }
        .content ul, .content ol { margin-bottom: 14px; padding-left: 24px; }
        .content li { margin-bottom: 4px; }
        .content code {
            background: #f0f2f5; padding: 2px 6px; border-radius: 3px;
            font-family: "JetBrains Mono", "Fira Code", "Consolas", monospace;
            font-size: 0.88em;
        }
        .content pre {
            background: #1e293b; color: #e2e8f0; padding: 16px 20px; border-radius: 8px;
            overflow-x: auto; margin-bottom: 16px; font-size: 13px; line-height: 1.6;
        }
        .content pre code { background: none; padding: 0; color: inherit; }
        .content table {
            width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: 14px;
        }
        .content th {
            background: #f0f4f8; text-align: left; padding: 8px 12px;
            border-bottom: 2px solid #d0d8e0; font-weight: 600;
        }
        .content td {
            padding: 7px 12px; border-bottom: 1px solid #e8ecf1;
        }
        .content tr:hover td { background: #fafbfc; }
        .content blockquote {
            border-left: 4px solid #2563eb; padding: 8px 16px; margin-bottom: 16px;
            background: #f0f4ff; color: #333; border-radius: 0 6px 6px 0;
        }
        .content a { color: #2563eb; }
        .content hr { border: none; border-top: 1px solid #e0e4e8; margin: 28px 0; }
        .content img { max-width: 100%; border-radius: 6px; }
        /* ---- Responsive ---- */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .content { padding: 20px 16px; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <span class="brand">🔬 Audio Lab</span>
    <a href="/">← 返回主页</a>
    <a href="/docs">文档首页</a>
    <a href="/docs/guide">使用指南</a>
    <a href="/docs/theory">理论基础</a>
    <a href="/docs/analysis">分析详解</a>
    <a href="/docs/results">结果解读</a>
</div>

<div class="layout">
    <nav class="sidebar">
        <h3>📚 文档导航</h3>
        <a href="/docs/guide"    class="{{ 'active' if page == 'guide' else '' }}">📖 使用指南</a>
        <a href="/docs/theory"   class="{{ 'active' if page == 'theory' else '' }}">🎓 理论基础</a>
        <a href="/docs/analysis" class="{{ 'active' if page == 'analysis' else '' }}">🔬 分析模块详解</a>
        <a href="/docs/results"  class="{{ 'active' if page == 'results' else '' }}">📊 结果解读</a>
        <hr style="margin: 16px 0;">
        <h3>🔗 链接</h3>
        <a href="/">← 返回主页</a>
        <a href="https://github.com/OPSAF/Audio-TSA">GitHub 仓库</a>
    </nav>

    <main class="content">
        {{ content | safe }}
    </main>
</div>

</body>
</html>
